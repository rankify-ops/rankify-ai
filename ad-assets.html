<!DOCTYPE html>

<meta charset="UTF-8">

<title>Rankify Ad Assets</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',-apple-system,sans-serif;background:#f0f2f5;color:#111;overflow-x:hidden}

/* ── PHONE FRAME ── */
.phone{position:relative;aspect-ratio:390/844;border-radius:14.4%/6.6%;overflow:hidden;flex-shrink:0;background:#1c1c1e;box-shadow:0 8px 30px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06)}
.phone-screen{position:absolute;inset:3.1% 3.1% 2.8%;border-radius:12.6%/5.6%;overflow:hidden;background:#000}
.phone-screen img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.phone-bar{position:absolute;bottom:2.4%;left:50%;transform:translateX(-50%);width:36%;height:0.6%;background:rgba(255,255,255,.3);border-radius:99px}
.phone::after{content:'';position:absolute;inset:0;border-radius:14.4%/6.6%;border:2px solid rgba(0,0,0,.08);pointer-events:none}

/* ── SECTION LABELS ── */
.asset-section{padding:80px 0;position:relative}
.asset-section+.asset-section{border-top:1px solid rgba(0,0,0,.06)}
.section-label{text-align:center;font-size:.75rem;text-transform:uppercase;letter-spacing:.15em;color:rgba(0,0,0,.2);margin-bottom:48px;font-weight:600}

/* ── HORIZONTAL ROWS ── */
.h-scroll-wrap{overflow:hidden;padding:10px 0;position:relative}
.h-scroll-wrap+.h-scroll-wrap{margin-top:24px}
.h-track{display:flex;gap:24px;width:max-content}
.h-track .phone{width:180px}

.h-track.scroll-left{animation:scrollLeft 45s linear infinite}
.h-track.scroll-right{animation:scrollRight 45s linear infinite}

@keyframes scrollLeft{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes scrollRight{0%{transform:translateX(-50%)}100%{transform:translateX(0)}}

/* ── VERTICAL COLUMNS ── */
.v-wrap{display:flex;justify-content:center;gap:24px;height:900px;overflow:hidden;mask-image:linear-gradient(to bottom,transparent 0%,#000 6%,#000 94%,transparent 100%);-webkit-mask-image:linear-gradient(to bottom,transparent 0%,#000 6%,#000 94%,transparent 100%)}
.v-col{overflow:hidden;width:200px;position:relative}
.v-track{display:flex;flex-direction:column;gap:24px}
.v-track .phone{width:200px}

.v-col-up .v-track{animation:vUp 28s linear infinite}
.v-col-down .v-track{animation:vDown 28s linear infinite}
.v-col-up-offset .v-track{animation:vUp 28s linear infinite;animation-delay:-10s}

@keyframes vUp{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}
@keyframes vDown{0%{transform:translateY(-50%)}100%{transform:translateY(0)}}

/* Speed variants */
.v-wrap.speed-b .v-col-up .v-track{animation-duration:32s}
.v-wrap.speed-b .v-col-down .v-track{animation-duration:24s}
.v-wrap.speed-b .v-col-up-offset .v-track{animation-duration:32s;animation-delay:-14s}

.v-wrap.speed-c .v-col-up .v-track{animation-duration:24s}
.v-wrap.speed-c .v-col-down .v-track{animation-duration:30s}
.v-wrap.speed-c .v-col-up-offset .v-track{animation-duration:24s;animation-delay:-7s}
</style>
</head>
